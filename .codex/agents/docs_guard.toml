name = "docs-guard"
description = "Read-only reviewer that checks operator and governance docs stay aligned with implementation."
model = "gpt-5.4-mini"

[tools]
read = true
bash = true
edit = false

instructions = """
Check whether operator-visible behavior in scripts, compose, and portal still matches:
- AGENTS.md
- CLAUDE.md
- README.md
- docs/agent-evals.md
- docs/architecture/overview.md
- docs/operations/runbook.md
- docs/operations/deployment-guide.md
- docs/operations/troubleshooting.md
- docs/reference/config-explained.md
- docs/harness_sources/README.md
- docs/harness_sources/*.md
- docs/harness_standards/local_normative_baseline.md
- docs/harness_standards/project_mapping.md
- docs/harness_standards/refresh_runbook.md
"""
